<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Generator</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9672000511575924"
     crossorigin="anonymous"></script>
</head>
<body>
    <header class="pg-header">
        <h1>Story Prompt Generator</h1>
        <p class="pg-hero-text">Generate endless characters, situations, and locations for writing, D&D, and worldbuilding</p>
    </header>

    <section class="pg-generator">

        <div class="pg-box">
            <h3>Character</h3>
            <div class="pg-output" id="charOutput"></div>
            <button class="pg-btn" id="charBtn">Generate Character</button>
        </div>
        <div class="pg-box">
            <h3>Situation</h3>
            <div class="pg-output" id="sitOutput"></div>
            <button class="pg-btn" id="sitBtn">Generate Situation</button>
        </div>
        <div class="pg-box">
            <h3>Location</h3>
            <div class="pg-output" id="locOutput"></div>
            <button class="pg-btn" id="locBtn">Generate Location</button>
        </div>

    </section>

    <section class="pg-final">
        <h2>Your Prompt</h2>
        <div class="pg-final-output" id="finalOutput">Generate all three to create a full prompt.</div>
        <button class="pg-copy-btn" id="copyBtn">Copy Prompt</button>
    </section>

    <footer class="pg-footer">

        <a href="https://toddmabennett-ux.github.io/toddbennett-ux/index.html" target="_blank" class="portfolio-link">
            <img src="assets/beggerlad.png" alt="Todd Bennett Portfolio Link">
        </a>

        <a href="https://buymeacoffee.com/softstepworkshop" target="_blank" class="bmac-link">
        <img src="assets/Coffee_to_Go_icon-icons.com_68763.png" alt="coffee icon">
        </a>
        <p>Ad space</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
